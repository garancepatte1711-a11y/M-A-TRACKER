  - { company: "J.P. Morgan",  host: "jpmc.fa.oraclecloud.com", site: "CX_1001" }

# API officielles agrégées — RECOMMANDÉ pour couvrir les boutiques
# françaises (Exelmans, Oderis, Cambon, Capitalmind, Messier, etc.)
# qui n'ont pas d'ATS à API publique. Clés gratuites, voir README.
adzuna:
  enabled: false
  app_id: ""
  app_key: ""
  countries: ["fr", "gb"]
  what: "M&A stage"

france_travail:
  enabled: false
  client_id: ""
  client_secret: ""
  keywords: "fusions acquisitions"

# ── Pages carrières surveillées directement (boutiques sans ATS) ──
# C'est comme ça qu'on couvre Financière de Courcelles & co :
# donnez juste l'URL de la page carrières / offres de la boutique.
# Le robot extrait tous les liens dont le titre matche les mots-clés.
# Pour ajouter une boutique : googlez "<nom> carrières" ou "<nom> join us",
# copiez l'URL de la page qui liste les offres, ajoutez une ligne ici.
# Optionnel : "selector" (sélecteur CSS) si la page est très chargée.
pages:
  # URL vérifiées par recherche web (07/2026)
  - { company: "Exelmans",                 url: "https://www.exelmans.com/nous-rejoindre" }
  - { company: "Cambon Partners",          url: "https://www.cambonpartners.com/en/careers" }
  - { company: "Oderis",                   url: "https://oderis.fr/offres-emploi/" }
  - { company: "Financière de Courcelles", url: "https://financieredecourcelles.fr/contact/join-us/" }
  # NB : les offres détaillées de Financière de Courcelles sont sur
  # financiere-de-courcelles.sainoo.com (page JavaScript, non lisible par
  # le robot) -> à surveiller manuellement ou via Adzuna.
  # Pour ajouter une boutique : googlez "<nom> carrières", collez l'URL :
  # - { company: "Nom",                    url: "COLLEZ_L_URL_ICI" }
