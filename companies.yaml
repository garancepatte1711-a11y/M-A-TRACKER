# ── Sociétés suivies et leur ATS ──────────────────────────────────
# Version élargie à partir de votre fichier "where to apply".
#
# IMPORTANT : les entrées marquées "à vérifier" sont mon meilleur
# pronostic sur l'ATS utilisé. Si une entrée est fausse, elle apparaît
# simplement avec "!!" dans le log du workflow (onglet Actions) sans
# rien casser : on la corrige ou on la supprime ensuite.

