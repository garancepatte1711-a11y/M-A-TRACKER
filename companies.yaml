# ── Sociétés suivies et leur ATS ──────────────────────────────────
# Version élargie à partir de votre fichier "where to apply".
#
# IMPORTANT : les entrées marquées "à vérifier" sont mon meilleur
# pronostic sur l'ATS utilisé. Si une entrée est fausse, elle apparaît
# simplement avec "!!" dans le log du workflow (onglet Actions) sans
# rien casser : on la corrige ou on la supprime ensuite.

greenhouse:
  - { company: "PJT Partners",        token: "pjtpartnerscampus" }
  - { company: "Point72",             token: "point72" }            # à vérifier
  - { company: "IMC Trading",         token: "imc" }                # à vérifier
  - { company: "DRW",                 token: "drw" }                # à vérifier
  - { company: "Optiver",             token: "optiver" }            # à vérifier (lien gh_jid dans votre fichier)
  - { company: "Evercore Campus",     token: "evercore" }           # à vérifier

lever:
  - { company: "Sia Partners",        slug: "sia-partners" }

smartrecruiters:
  - { company: "Société Générale",    slug: "SocieteGenerale" }
  - { company: "BNP Paribas",         slug: "BNPParibas" }
  - { company: "Natixis (BPCE)",      slug: "BPCE" }
  - { company: "Alantra",             slug: "Alantra" }             # à vérifier
  - { company: "Houlihan Lokey",      slug: "HoulihanLokey" }       # à vérifier

