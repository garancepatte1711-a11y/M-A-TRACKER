  - { company: "Blackstone",       tenant: "blackstone",     wd: "wd1", site: "Blackstone_Campus_Careers" }
  - { company: "Rothschild & Co",  tenant: "rothschildandco", wd: "wd3", site: "Careers" }
  - { company: "Moelis & Company", tenant: "moelis",         wd: "wd1", site: "Moelis" }
  - { company: "ING",              tenant: "ing",            wd: "wd3", site: "ICSGBLCOR" }
  - { company: "Santander",        tenant: "santander",      wd: "wd3", site: "SantanderCareers" }   # à vérifier
  - { company: "Schroders",        tenant: "schroders",      wd: "wd3", site: "schroderscareers" }   # à vérifier
  - { company: "PIMCO",            tenant: "pimco",          wd: "wd1", site: "PIMCO" }              # à vérifier
  - { company: "Jefferies",        tenant: "jefferies",      wd: "wd5", site: "jefferiescareers" }   # à vérifier
