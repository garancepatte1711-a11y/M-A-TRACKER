  - { company: "Point72",             token: "point72" }            # à vérifier
  - { company: "IMC Trading",         token: "imc" }                # à vérifier
  - { company: "DRW",                 token: "drw" }                # à vérifier
  - { company: "Optiver",             token: "optiver" }            # à vérifier (lien gh_jid dans votre fichier)
  - { company: "Evercore Campus",     token: "evercore" }           # à vérifier

