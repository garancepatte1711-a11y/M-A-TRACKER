# ── Sociétés suivies et leur ATS ──────────────────────────────────
# Chaque connecteur interroge l'API publique de l'ATS correspondant.
# Pour ajouter une société : trouvez l'URL de sa page carrières,
# identifiez l'ATS (visible dans l'URL), et ajoutez une entrée ici.
#
# Comment identifier l'ATS depuis l'URL de la page carrières :
#   *.greenhouse.io           -> greenhouse  (token = ce qui suit /boards/ ou job-boards.greenhouse.io/)
#   jobs.lever.co/<slug>      -> lever
#   *.smartrecruiters.com     -> smartrecruiters (slug = nom dans l'URL)
#   *.wd1/wd3/wd5.myworkdayjobs.com/<site> -> workday (tenant, wd, site)
#   *.recruitee.com           -> recruitee
#   jobs.ca-cib.com etc. (ATS propriétaires) -> pas d'API publique, voir README

greenhouse:
  # token du board Greenhouse
  - { company: "PJT Partners",        token: "pjtpartnerscampus" }
  - { company: "Qonto",               token: "qonto" }

lever:
  # slug jobs.lever.co/<slug>
  - { company: "Sia Partners",        slug: "sia-partners" }

smartrecruiters:
  # slug api.smartrecruiters.com/v1/companies/<slug>/postings
  - { company: "Société Générale",    slug: "SocieteGenerale" }
  - { company: "BNP Paribas",         slug: "BNPParibas" }
  - { company: "Natixis",             slug: "BPCE" }

workday:
  # tenant + numéro wd + site (visible dans l'URL myworkdayjobs.com)
  - { company: "Lazard",       tenant: "lazard",     wd: "wd1", site: "LazardCareers" }
  - { company: "Rothschild & Co", tenant: "rothschildandco", wd: "wd3", site: "Careers" }
  - { company: "Blackstone",   tenant: "blackstone", wd: "wd1", site: "Blackstone_Campus_Careers" }
  - { company: "ING",          tenant: "ing",        wd: "wd3", site: "ICSGBLCOR" }
  - { company: "Moelis",       tenant: "moelis",     wd: "wd1", site: "Moelis" }

recruitee:
  # sous-domaine <slug>.recruitee.com
  - { company: "Exemple Boutique M&A", slug: "exemple" }

# API officielles agrégées (clés gratuites, voir README)
adzuna:
  enabled: false          # mettre true après avoir créé app_id/app_key sur developer.adzuna.com
  app_id: ""
  app_key: ""
  countries: ["fr", "gb"]
  what: "M&A stage"

france_travail:
  enabled: false          # créer une app sur francetravail.io (API "Offres d'emploi v2")
  client_id: ""
  client_secret: ""
  keywords: "fusions acquisitions"
